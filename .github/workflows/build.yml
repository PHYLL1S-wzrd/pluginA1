name: Build Mac VST3 (HISE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show project structure
        run: ls -R Dorop/Builds/MacOSX

      - name: List Xcode schemes
        run: |
          xcodebuild \
            -list \
            -project "Dorop/Builds/MacOSX/DoropEngine.xcodeproj"

      - name: Build (explicit scheme attempt)
        run: |
          xcodebuild \
            -project "Dorop/Builds/MacOSX/DoropEngine.xcodeproj" \
            -configuration Release \
            -alltargets \
            CODE_SIGNING_ALLOWED=NO

      - name: Find VST3
        run: |
          echo "Searching for VST3..."
          find . -name "*.vst3" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-vst3
          path: |
            **/*.vst3
            **/build/**/*.vst3
            **/Release/**/*.vst3
