name: Build Mac VST3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show structure
        run: ls -R

      - name: Build project
        run: |
          xcodebuild \
            -project "Dorop/Binaries/Builds/MacOSX/DoropEngine.xcodeproj" \
            -configuration Release \
            -alltargets \
            CODE_SIGNING_ALLOWED=NO

      - name: Find VST3
        run: find . -name "*.vst3" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-vst3
          path: "**/*.vst3"
